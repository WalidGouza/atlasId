name: AtlasID Integrated Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: atlasid
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Run API Tests
        run: npm test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/atlasid

  frontend-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      
      - name: Install Dependencies
        run: npm install
      
      - name: Code Quality Check (Lint)
        run: npx eslint . --max-warnings 0

  build-and-package:
    needs: [backend-gate, frontend-gate]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Backend Image
        run: docker build -t atlasid-backend ./backend
      - name: Notification
        run: echo "Full system validated and Docker images built."